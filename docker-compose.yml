services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vps_manager
      POSTGRES_USER: vps_manager
      POSTGRES_PASSWORD: vps_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vps_manager -d vps_manager"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
